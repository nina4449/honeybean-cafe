<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Honeybean Café Contact</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="contact.css" />
  </head>

  <body>

    <header>
      <div class="logo">
        <img src="./photos/honeybeancafe.png" alt="Honeybean Café Logo" />
      </div>

      <nav>
        <ul>
          <li><a href="./index.html">Home</a></li>
          <li><a href="./menu.html">Menu</a></li>
          <li><a href="./contact.html">Location</a></li>
          <li><a href="./contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <section class="contact-hero">
      <h1>CONTACT & LOCATION</h1>
    </section>

    <section class="contact-section">
      <div class="contact-box">
        <h2>PLEASE FILL HERE</h2>

        <form>
          <div class="form-group">
            <label>Name:</label>
            <input type="text" />
          </div>

          <div class="form-group">
            <label>Email:</label>
            <input type="email" />
          </div>

          <div class="form-group">
            <label>Messages:</label>
            <textarea></textarea>
          </div>

          <button type="submit">SEND</button>
        </form>
      </div>
    </section>

    <section class="location-section">
      <div class="map-box">
        <img src="./photos/map.png" alt="map of cafe location" />
      </div>

      <div class="location-info">
        <h3>ADDRESS:</h3>

        <p>488 South Rd, Moorabbin, VIC, 3189</p>

        <h3>OPENING HOURS:</h3>

        <p>7:30 am – 2:30 pm (Mon–Thurs)</p>
        <p>7:30 am – 7:30 pm (Friday)</p>
        <p>7:30 am – 2:30 pm (Sat & Sun)</p>
      </div>
    </section>

    <footer>
      <p>© Honeybean Café 2026</p>

      <div class="social-icons">
        <img src="./photos/ig-socials.png" alt="Instagram" />

        <img src="./photos/ig-socials.png" alt="Facebook" />
      </div>
    </footer>
  </body>
</html>
